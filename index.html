<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WaveRoom Music</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23090a0d'/%3E%3Cpath d='M26 44V17l22-4v25' fill='none' stroke='%2320d6bd' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='20' cy='44' r='8' fill='%23ff715f'/%3E%3Ccircle cx='42' cy='38' r='8' fill='%23f4c95d'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <svg aria-hidden="true" class="sprite">
      <symbol id="icon-album" viewBox="0 0 24 24">
        <rect x="4" y="4" width="16" height="16" rx="3"></rect>
        <circle cx="12" cy="12" r="3"></circle>
        <circle cx="12" cy="12" r="0.8"></circle>
      </symbol>
      <symbol id="icon-chevron-left" viewBox="0 0 24 24">
        <path d="m15 18-6-6 6-6"></path>
      </symbol>
      <symbol id="icon-chevron-right" viewBox="0 0 24 24">
        <path d="m9 18 6-6-6-6"></path>
      </symbol>
      <symbol id="icon-device" viewBox="0 0 24 24">
        <rect x="5" y="4" width="14" height="16" rx="2"></rect>
        <path d="M10 18h4"></path>
      </symbol>
      <symbol id="icon-folder" viewBox="0 0 24 24">
        <path d="M3 7.5A2.5 2.5 0 0 1 5.5 5H10l2 2h6.5A2.5 2.5 0 0 1 21 9.5v7A2.5 2.5 0 0 1 18.5 19h-13A2.5 2.5 0 0 1 3 16.5z"></path>
      </symbol>
      <symbol id="icon-heart" viewBox="0 0 24 24">
        <path d="M19.5 13.3 12 20l-7.5-6.7A5 5 0 0 1 12 6.8a5 5 0 0 1 7.5 6.5Z"></path>
      </symbol>
      <symbol id="icon-list" viewBox="0 0 24 24">
        <path d="M8 6h13"></path>
        <path d="M8 12h13"></path>
        <path d="M8 18h13"></path>
        <path d="M3 6h.01"></path>
        <path d="M3 12h.01"></path>
        <path d="M3 18h.01"></path>
      </symbol>
      <symbol id="icon-music" viewBox="0 0 24 24">
        <path d="M9 18V5l11-2v13"></path>
        <circle cx="6" cy="18" r="3"></circle>
        <circle cx="17" cy="16" r="3"></circle>
      </symbol>
      <symbol id="icon-pause" viewBox="0 0 24 24">
        <path d="M8 5v14"></path>
        <path d="M16 5v14"></path>
      </symbol>
      <symbol id="icon-play" viewBox="0 0 24 24">
        <path d="m8 5 12 7-12 7z"></path>
      </symbol>
      <symbol id="icon-plus" viewBox="0 0 24 24">
        <path d="M12 5v14"></path>
        <path d="M5 12h14"></path>
      </symbol>
      <symbol id="icon-repeat" viewBox="0 0 24 24">
        <path d="m17 2 4 4-4 4"></path>
        <path d="M3 11V9a3 3 0 0 1 3-3h15"></path>
        <path d="m7 22-4-4 4-4"></path>
        <path d="M21 13v2a3 3 0 0 1-3 3H3"></path>
      </symbol>
      <symbol id="icon-search" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="7"></circle>
        <path d="m20 20-3.2-3.2"></path>
      </symbol>
      <symbol id="icon-shuffle" viewBox="0 0 24 24">
        <path d="M16 3h5v5"></path>
        <path d="M4 20 21 3"></path>
        <path d="M21 16v5h-5"></path>
        <path d="M15 15l6 6"></path>
        <path d="M4 4l5 5"></path>
      </symbol>
      <symbol id="icon-skip-back" viewBox="0 0 24 24">
        <path d="M6 5v14"></path>
        <path d="m20 5-12 7 12 7z"></path>
      </symbol>
      <symbol id="icon-skip-forward" viewBox="0 0 24 24">
        <path d="M18 5v14"></path>
        <path d="m4 5 12 7-12 7z"></path>
      </symbol>
      <symbol id="icon-upload" viewBox="0 0 24 24">
        <path d="M12 16V4"></path>
        <path d="m7 9 5-5 5 5"></path>
        <path d="M4 20h16"></path>
      </symbol>
      <symbol id="icon-volume" viewBox="0 0 24 24">
        <path d="M11 5 6 9H3v6h3l5 4z"></path>
        <path d="M15.5 8.5a5 5 0 0 1 0 7"></path>
        <path d="M18.5 5.5a9 9 0 0 1 0 13"></path>
      </symbol>
      <symbol id="icon-x" viewBox="0 0 24 24">
        <path d="m18 6-12 12"></path>
        <path d="m6 6 12 12"></path>
      </symbol>
    </svg>

    <input id="file-input" type="file" accept="audio/*" multiple hidden />
    <audio id="audio" preload="metadata"></audio>

    <div class="app-shell" data-drop-zone>
      <aside class="sidebar">
        <a class="brand" href="#" aria-label="WaveRoom home">
          <span class="brand-mark" aria-hidden="true">
            <svg><use href="#icon-music"></use></svg>
          </span>
          <span class="brand-name">WaveRoom</span>
        </a>

        <nav class="nav-list" aria-label="Main">
          <button class="nav-item active" type="button" data-view="Library" title="Library" aria-label="Library">
            <svg><use href="#icon-album"></use></svg>
            <span>Library</span>
          </button>
          <button class="nav-item" type="button" data-view="Search" title="Search" aria-label="Search">
            <svg><use href="#icon-search"></use></svg>
            <span>Search</span>
          </button>
          <button class="nav-item" type="button" data-view="Playlists" title="Playlists" aria-label="Playlists">
            <svg><use href="#icon-list"></use></svg>
            <span>Playlists</span>
          </button>
          <button class="nav-item" type="button" data-view="Uploads" title="Uploads" aria-label="Uploads">
            <svg><use href="#icon-upload"></use></svg>
            <span>Uploads</span>
          </button>
          <button class="nav-item" type="button" data-view="Favorites" title="Favorites" aria-label="Favorites">
            <svg><use href="#icon-heart"></use></svg>
            <span>Favorites</span>
          </button>
        </nav>

        <div class="playlist-nav">
          <div class="eyeless-label">Playlists</div>
          <button type="button" data-playlist="Late Night">Late Night</button>
          <button type="button" data-playlist="Deep Focus">Deep Focus</button>
          <button type="button" data-playlist="Fresh Imports">Fresh Imports</button>
          <button type="button" data-playlist="Drive Home">Drive Home</button>
        </div>

        <button class="sidebar-upload" type="button" data-action="open-files" title="Open files" aria-label="Open files">
          <svg><use href="#icon-folder"></use></svg>
          <span>Open files</span>
        </button>
      </aside>

      <main class="content">
        <header class="topbar">
          <div class="search-box">
            <svg><use href="#icon-search"></use></svg>
            <input id="search-input" type="search" placeholder="Search" autocomplete="off" />
          </div>
          <div class="topbar-actions">
            <button class="ghost-button icon-only" type="button" data-action="clear-session" title="Clear queue" aria-label="Clear queue">
              <svg><use href="#icon-x"></use></svg>
            </button>
            <button class="primary-button icon-only" type="button" data-action="open-files" title="Import" aria-label="Import">
              <svg><use href="#icon-upload"></use></svg>
            </button>
          </div>
        </header>

        <section class="hero-panel" aria-labelledby="home-title" hidden>
          <div class="hero-copy">
            <h1 id="home-title">Good evening</h1>
            <p>No ads. Your files. Your room.</p>
            <div class="hero-actions">
              <button class="primary-button" type="button" data-action="play-visible">
                <svg><use href="#icon-play"></use></svg>
                <span>Play library</span>
              </button>
              <button class="ghost-button" type="button" data-action="open-files">Open files</button>
            </div>
          </div>
          <div class="hero-stack" aria-label="Featured tracks">
            <div class="stack-card stack-card-a">
              <img src="assets/dreamstate-drive.jpg" alt="Dreamstate Drive cover art" />
              <span>Dreamstate Drive</span>
            </div>
            <div class="stack-card stack-card-b">
              <img src="assets/neon-atlas.jpg" alt="Neon Atlas cover art" />
              <span>Neon Atlas</span>
            </div>
          </div>
        </section>

        <section class="shelf" aria-labelledby="mixes-title">
          <div class="section-heading">
            <h2 id="mixes-title">Radio</h2>
            <button type="button" data-action="play-demos" title="Play demos" aria-label="Play demos">
              <svg><use href="#icon-play"></use></svg>
            </button>
          </div>
          <div id="mix-grid" class="mix-grid"></div>
        </section>

        <section class="shelf recent-section" aria-labelledby="imported-title">
          <div class="section-heading">
            <h2 id="imported-title">Recent</h2>
            <button type="button" data-action="open-files" title="Open files" aria-label="Open files">
              <svg><use href="#icon-folder"></use></svg>
            </button>
          </div>
          <div id="recent-list" class="track-list"></div>
        </section>

        <section class="shelf" aria-labelledby="library-title">
          <div class="section-heading">
            <h2 id="library-title">Tracks</h2>
            <span id="library-count"></span>
          </div>
          <div id="library-list" class="track-list library-list"></div>
        </section>
      </main>

      <aside class="right-rail">
        <section class="queue-card" aria-labelledby="queue-title">
          <div class="section-heading compact">
            <h2 id="queue-title">Up Next</h2>
            <button type="button" data-action="clear-session">Clear</button>
          </div>
          <div id="queue-list" class="queue-list"></div>
        </section>

        <section class="now-card" aria-labelledby="now-title">
          <div class="section-heading compact">
            <h2 id="now-title">Now Playing</h2>
            <button class="icon-button" type="button" data-action="toggle-favorite" aria-label="Favorite current track">
              <svg><use href="#icon-heart"></use></svg>
            </button>
          </div>
          <div id="now-art" class="now-art"></div>
          <div class="now-meta">
            <strong id="now-title-text">Dreamstate Drive</strong>
            <span id="now-artist-text">Mira Vale</span>
          </div>
          <dl class="audio-facts">
            <div>
              <dt>Source</dt>
              <dd id="fact-source">Demo</dd>
            </div>
            <div>
              <dt>Length</dt>
              <dd id="fact-length">0:24</dd>
            </div>
            <div>
              <dt>Format</dt>
              <dd id="fact-format">WAV</dd>
            </div>
          </dl>
        </section>
      </aside>

      <footer class="player">
        <div class="player-track">
          <div id="mini-art" class="mini-art"></div>
          <div>
            <strong id="mini-title">Dreamstate Drive</strong>
            <span id="mini-artist">Mira Vale</span>
          </div>
        </div>

        <div class="transport">
          <div class="transport-buttons">
            <button class="icon-button" type="button" data-action="toggle-shuffle" aria-label="Shuffle">
              <svg><use href="#icon-shuffle"></use></svg>
            </button>
            <button class="icon-button" type="button" data-action="previous" aria-label="Previous">
              <svg><use href="#icon-skip-back"></use></svg>
            </button>
            <button class="play-button" type="button" data-action="toggle-play" aria-label="Play">
              <svg id="play-icon"><use href="#icon-play"></use></svg>
            </button>
            <button class="icon-button" type="button" data-action="next" aria-label="Next">
              <svg><use href="#icon-skip-forward"></use></svg>
            </button>
            <button class="icon-button" type="button" data-action="toggle-repeat" aria-label="Repeat">
              <svg><use href="#icon-repeat"></use></svg>
            </button>
          </div>
          <div class="timeline">
            <span id="elapsed">0:00</span>
            <input id="progress" type="range" min="0" max="1000" value="0" aria-label="Playback progress" />
            <span id="duration">0:00</span>
          </div>
        </div>

        <div class="player-tools">
          <button class="icon-button" type="button" data-action="open-files" aria-label="Import audio files">
            <svg><use href="#icon-upload"></use></svg>
          </button>
          <button class="icon-button" type="button" aria-label="Local device">
            <svg><use href="#icon-device"></use></svg>
          </button>
          <svg class="volume-icon" aria-hidden="true"><use href="#icon-volume"></use></svg>
          <input id="volume" type="range" min="0" max="1" step="0.01" value="0.74" aria-label="Volume" />
        </div>
      </footer>
      <div id="toast" class="toast" role="status" aria-live="polite"></div>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
